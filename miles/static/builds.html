<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miles · Builds</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
  <link rel="stylesheet" href="/theme.css">
  <style>
    .builds-view h1 {
      font-size: 1.25rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .builds-view .subtitle { font-size: 0.8125rem; color: var(--muted); margin-bottom: 1.25rem; }
    .builds-view .builds-empty { font-size: 0.8125rem; color: var(--muted); padding: 1rem 0; }

    /* Stat strip — ported from races.html's .dist-view pattern, scoped locally. */
    .builds-view .stat-strip {
      display: flex;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .builds-view .stat { padding: 0.625rem 1.25rem; }
    .builds-view .stat + .stat { border-left: 1px solid var(--border); }
    .builds-view .stat-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.1875rem;
    }
    .builds-view .stat-value {
      display: flex;
      align-items: baseline;
      gap: 0.375rem;
      font-size: 1.0625rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .builds-view .stat-sub { font-size: 0.6875rem; font-weight: 400; color: var(--muted); }

    /* Dense table — ported from races.html's .dist-view density rules, scoped locally. */
    .builds-view .dense tbody td { padding: 0.25rem 0.75rem; font-size: 0.75rem; }
    .builds-view .dense thead th { padding: 0.375rem 0.75rem; font-size: 0.625rem; }
    .builds-view .dense .spark { display: block; }

    /* Cross-links into build.html, compare.html, and plan.html. */
    .builds-view .entity-link { color: inherit; text-decoration: none; }
    .builds-view .entity-link:hover { text-decoration: underline; }
    .builds-view .compare-link { font-size: 0.75rem; color: var(--muted); text-decoration: none; }
    .builds-view .compare-link:hover { text-decoration: underline; }
    .builds-view .plan-link { font-size: 0.75rem; color: var(--muted); text-decoration: none; margin-left: 0.375rem; }
    .builds-view .plan-link:hover { text-decoration: underline; }

    /* Finish time of a casual-effort race — de-emphasized, not hidden. */
    .builds-view .casual-time { color: var(--muted); font-style: italic; }

    /* Transient highlight when arriving via a #build-YYYY-MM-DD hash. */
    .builds-view .flash td { background: var(--pr-bg-hover) !important; transition: background 1s ease 1s; }
  </style>
</head>
<body>
<script src="/nav.js"></script>
<script src="/charts.js"></script>

<main class="builds-view">
  <h1>Builds</h1>
  <p class="subtitle" id="subtitle">Loading…</p>

  <div class="stat-strip" id="stat-strip" style="display:none"></div>

  <div id="section-builds" style="display:none">
    <div class="scroll dense">
      <table>
        <thead>
          <tr>
            <th>Race</th>
            <th class="r">Time</th>
            <th>Start</th>
            <th class="r">Weeks</th>
            <th class="r">Shape</th>
            <th title="What set the window's start">Bounded by</th>
            <th class="r">Avg mpw</th>
            <th class="r">Workouts / wk</th>
            <th>Compare</th>
          </tr>
        </thead>
        <tbody id="body-builds"></tbody>
      </table>
    </div>
  </div>

  <p class="builds-empty" id="empty" style="display:none">No builds detected yet — builds need a race and enough training around it.</p>
</main>

<script>
  function td(val, cls = 'r', title = '') {
    if (val == null) return `<td class="dash">—</td>`;
    const titleAttr = title ? ` title="${title}"` : '';
    return `<td class="${cls}"${titleAttr}>${val}</td>`;
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g,
      ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  // Build's race.distance_category (races.py's classify_race_distance buckets,
  // e.g. '5K'/'10K'/'15K'/'10M'/'half'/'30K'/'marathon'/'50K'/'other') -> the
  // four buckets compare.html's tabs know, lowercased for its hash format.
  // Anything else (15K/10M/30K/50K/other) gets no link. Ported from training.html.
  const COMPARE_BUCKET = { '5K': '5k', '10K': '10k', half: 'half', marathon: 'marathon' };

  // builds.py's bounded_by reasons, in the athlete's terms (see detect_builds).
  const BOUNDED_BY_TITLE = {
    ramp: 'Window trimmed to where weekly mileage began ramping up',
    cap: 'Window hit the 18-week max build length',
    prior_race: 'Window starts just after the previous anchor race',
    period_start: 'Training period began here — no earlier weeks to include',
  };

  // 'YYYY-MM-DD' + whole-week offsets -> 'YYYY-MM-DD', via Date's own
  // calendar math (safe across month/DST boundaries, unlike ms arithmetic).
  // Ported from training.html.
  function addDays(dateStr, days) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  // Build's own weeks, sliced from the already-loaded global weekly series
  // into the {offset, miles} shape sparklineSVG expects (offset -weeks..0).
  // Ported from training.html.
  function buildWeeksSeries(build, milesByMonday) {
    const arr = [];
    for (let o = -build.weeks; o <= 0; o++) {
      const monday = addDays(build.start, (o + build.weeks) * 7);
      arr.push({ offset: o, miles: milesByMonday.get(monday) ?? 0 });
    }
    return arr;
  }

  function raceLabel(race) {
    return `${race.name ?? race.distance_category} (${race.date})`;
  }

  // Bucket param for /api/distance-builds — distance_builds.py's Title Case
  // Bucket literal, keyed by race.distance_category; the same four
  // categories COMPARE_BUCKET recognizes, since only those have a build
  // history deep enough to support a reference comparison.
  const REF_BUCKET = { '5K': '5K', '10K': '10K', half: 'Half', marathon: 'Marathon' };

  // The athlete's reference-build override persists per distance bucket and
  // is honored by every surface that compares against a reference (plan.html's
  // readiness, this strip, build.html's reference row) — see refStorageKey
  // in plan.html for the canonical statement of this convention. A stored
  // date that no longer resolves to a candidate falls back to the fastest
  // raced effort (the PR build) silently.
  function refStorageKey(bucket) { return `miles.refBuild.${bucket}`; }

  function resolveRefRow(rows, bucket) {
    const raced = rows.filter(r => r.effort === 'raced' && r.finish_time_s != null)
      .slice().sort((a, b) => a.finish_time_s - b.finish_time_s);
    const pr = raced[0] ?? rows[rows.length - 1];
    let stored = null;
    try { stored = localStorage.getItem(refStorageKey(bucket)); } catch { /* storage unavailable */ }
    const match = stored ? rows.find(r => r.date === stored) : null;
    return match ?? pr;
  }

  function fmtSigned(v, decimals = 1) {
    return `${v < 0 ? '−' : '+'}${Math.abs(v).toFixed(decimals)}`;
  }

  // The latest build's avg mpw against the reference build at the same
  // distance bucket. Omitted when the category has no compare bucket, too
  // few races exist at that distance to pick a reference, or the reference
  // resolves to the latest build itself (the latest race is the fastest
  // raced effort on record — nothing else to compare it against).
  async function vsReferenceStat(latest) {
    const bucket = REF_BUCKET[latest.race.distance_category];
    if (!bucket) return '';
    let rows;
    try {
      const res = await fetch(`/api/distance-builds?bucket=${encodeURIComponent(bucket)}`);
      if (!res.ok) return '';
      rows = await res.json();
    } catch {
      return '';
    }
    if (rows.length < 2) return '';
    const ref = resolveRefRow(rows, bucket);
    if (!ref || ref.date === latest.race.date) return '';
    const delta = latest.avg_mpw - ref.build.avg_mpw;
    return `
      <div class="stat">
        <div class="stat-label">vs</div>
        <div class="stat-value">${fmtSigned(delta)}<span class="stat-sub">mpw</span></div>
        <div class="stat-sub">${esc(fmt.shortName(ref.name ?? bucket, ref.date))}</div>
      </div>`;
  }

  async function renderStatStrip(builds) {
    const el = document.getElementById('stat-strip');
    if (!builds.length) return;

    const years = builds.map(b => Number(b.start.slice(0, 4)));
    const raceYears = builds.map(b => Number(b.race.date.slice(0, 4)));

    let latest = builds[0];
    for (const b of builds) if (b.race.date > latest.race.date) latest = b;

    el.style.display = '';
    el.innerHTML = `
      <div class="stat">
        <div class="stat-label">Builds</div>
        <div class="stat-value">${builds.length}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Latest</div>
        <div class="stat-value">${esc(fmt.shortName(latest.race.name ?? latest.race.distance_category, latest.race.date))}<span class="stat-sub">${latest.avg_mpw.toFixed(1)} mpw</span></div>
        <div class="stat-sub">${latest.race.date}</div>
      </div>
      ${await vsReferenceStat(latest)}
    `;

    document.getElementById('subtitle').textContent =
      `${builds.length} detected builds · ${Math.min(...years)}–${Math.max(...raceYears)}`;
  }

  function renderBuilds(builds, weeks, races, racePlans) {
    if (!builds.length) {
      document.getElementById('empty').style.display = '';
      return;
    }
    document.getElementById('section-builds').style.display = '';

    const milesByMonday = new Map(weeks.map(w => [w.monday, w.miles]));
    // Anchor-race result (finish time, effort) by date — Build.race carries
    // only identity fields, so join against the payload's races array.
    const raceByDate = new Map(races.map(r => [r.date, r]));
    // detect_builds() returns builds oldest-first; reverse so the initial
    // render already reads Start-descending, matching makeSortable's
    // initial-arrow hint below (it labels the sort, it doesn't apply it).
    const ordered = [...builds].reverse();
    const buildSeries = ordered.map(b => buildWeeksSeries(b, milesByMonday));
    const globalMax = Math.max(0, ...buildSeries.flat().map(w => w.miles));

    document.getElementById('body-builds').innerHTML = ordered.map((b, i) => {
      const label = raceLabel(b.race);
      const bucket = COMPARE_BUCKET[b.race.distance_category];
      const compareCell = bucket
        ? `<td><a class="compare-link" href="/compare.html#${bucket}:${b.race.date}">vs →</a></td>`
        : td(null, '');
      // A completed plan closed out this race — link to its retrospective.
      const planId = racePlans ? racePlans[b.race.date] : undefined;
      const planLink = planId != null
        ? ` <a class="plan-link" href="/plan.html" title="View plan retrospective">Plan →</a>` : '';
      const result = raceByDate.get(b.race.date);
      const timeCell = result?.finish_time_s == null
        ? td(null)
        : td(fmt.time(result.finish_time_s),
             result.effort === 'casual' ? 'r casual-time' : 'r',
             result.effort === 'casual' ? 'casual effort' : '');
      return `<tr data-race="${b.race.date}">
        <td><a class="entity-link" href="/build.html#${b.race.date}">${esc(label)}</a>${planLink}</td>
        ${timeCell}
        ${td(b.start, '')}
        ${td(b.weeks)}
        <td class="r">${sparklineSVG(buildSeries[i], b.weeks, globalMax, false)}</td>
        ${td(b.bounded_by, '', BOUNDED_BY_TITLE[b.bounded_by] ?? '')}
        ${td(b.avg_mpw.toFixed(1))}
        ${td(b.workouts_per_week.toFixed(2))}
        ${compareCell}
      </tr>`;
    }).join('');
    makeSortable(document.getElementById('body-builds').closest('table'), { col: 2, dir: 'desc' });
  }

  // races.html and build.html link here as #build-{race date}; scroll the
  // matching row into view and flash it. No-ops if the hash doesn't match
  // or the row isn't rendered yet (called again after render).
  function focusBuildFromHash() {
    const m = /^#build-(\d{4}-\d{2}-\d{2})$/.exec(location.hash);
    if (!m) return;
    const row = document.querySelector(`#body-builds tr[data-race="${m[1]}"]`);
    if (!row) return;
    row.scrollIntoView({ block: 'center' });
    row.classList.add('flash');
    setTimeout(() => row.classList.remove('flash'), 2000);
  }

  window.addEventListener('hashchange', focusBuildFromHash);

  async function load() {
    const res = await fetch('/api/weekly-history');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  load().then(async data => {
    const { weeks, builds, races, race_plans } = data;
    if (!builds.length) {
      document.getElementById('subtitle').textContent = 'No builds detected yet.';
      document.getElementById('empty').style.display = '';
      return;
    }
    await renderStatStrip(builds);
    renderBuilds(builds, weeks, races, race_plans);
    focusBuildFromHash();
  }).catch(err => {
    document.getElementById('subtitle').textContent = `Error: ${err.message}`;
  });
</script>
</body>
</html>
