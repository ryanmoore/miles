<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miles · Plan</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
  <link rel="stylesheet" href="/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js" integrity="sha384-pPi0zxBAoDu6+JXW/C68UZLvBUUtU+7zonhif43rqj7pxsGyqyqzcian2Rj37Rss" crossorigin="anonymous"></script>
  <style>
    .plan-view h1 {
      font-size: 1.25rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .plan-view .subtitle { font-size: 0.8125rem; color: var(--muted); margin-bottom: 1.25rem; }

    /* Empty state */
    .plan-view .plan-empty {
      max-width: 32rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem 1.75rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .plan-view .plan-empty h2 { font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; }
    .plan-view .plan-empty code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.05rem 0.35rem;
      font-size: 0.8125rem;
    }

    /* Stat strip — ported from training.html's pattern, scoped locally. */
    .plan-view .stat-strip {
      display: flex;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .plan-view .stat { padding: 0.625rem 1.25rem; }
    .plan-view .stat + .stat { border-left: 1px solid var(--border); }
    .plan-view .stat-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.1875rem;
    }
    .plan-view .stat-value {
      display: flex;
      align-items: baseline;
      gap: 0.375rem;
      font-size: 1.0625rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .plan-view .stat-sub { font-size: 0.6875rem; font-weight: 400; color: var(--muted); }

    .plan-view .chart-wrap { height: 320px; }
    .plan-view .chart-wrap-small { height: 190px; }
    .plan-view .subchart-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.375rem;
    }
    .plan-view .chart-caption {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      margin-top: 0.625rem;
    }

    /* Custom chart legend — two encodings (actual bar / planned reference line),
       built as plain HTML like build.html's .cal-legend rather than an ECharts
       legend widget. */
    .plan-view .chart-legend {
      display: flex;
      gap: 1.25rem;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.625rem;
    }
    .plan-view .legend-swatch { display: inline-flex; align-items: center; gap: 0.375rem; }
    .plan-view .legend-box { width: 10px; height: 10px; border-radius: 2px; }
    .plan-view .legend-line { width: 16px; height: 0; border-top: 2px dashed var(--muted); }

    /* Adherence band chip — per-week read, on the calendar leader cell. */
    .plan-view .band-chip {
      display: inline-block;
      font-size: 0.5625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.0625rem 0.3125rem;
      border-radius: 999px;
      margin-top: 0.1875rem;
      color: #fff;
      width: fit-content;
    }

    /* Flags panel — deliberately absent from the DOM entirely when there are
       no active flags (see renderFlags): silence is the common case by design. */
    .plan-view .flags-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }
    .plan-view .flag-item {
      display: flex;
      gap: 0.625rem;
      align-items: baseline;
      padding: 0.625rem 1.125rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--gridline);
    }
    .plan-view .flag-item:first-child { border-top: none; }
    .plan-view .flag-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--series-6);
      flex-shrink: 0;
      transform: translateY(-1px);
    }

    /* Calendar — one row per plan week, Monday through Sunday columns.
       overflow-x + min-width keep the grid legible on narrow viewports:
       it scrolls sideways rather than crushing 8 columns into slivers. */
    .plan-view .cal { border: 1px solid var(--gridline); border-radius: 8px; overflow-x: auto; overflow-y: hidden; }
    .plan-view .cal-header, .plan-view .cal-row {
      display: grid;
      grid-template-columns: 112px repeat(7, minmax(0, 1fr));
      min-width: 720px;
    }
    .plan-view .cal-header .cal-hcell {
      font-size: 0.625rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      padding: 0.375rem 0;
      background: var(--bg);
      border-bottom: 1px solid var(--gridline);
    }
    .plan-view .cal-header .cal-hcell:first-child { background: transparent; border-bottom: none; }
    .plan-view .cal-leader {
      padding: 0.375rem 0.625rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      border-right: 1px solid var(--gridline);
      border-top: 1px solid var(--gridline);
      margin-top: -1px;
    }
    .plan-view .cal-row:first-child .cal-leader { border-top: none; margin-top: 0; }
    .plan-view .cal-leader .tile-sub { font-size: 0.6875rem; margin-top: 0.125rem; color: var(--muted); }
    .plan-view .cal-row.current .cal-leader { background: var(--pr-bg); }
    .plan-view .cal-row.current .cal-day { background: var(--pr-bg); }
    .plan-view .cal-day {
      min-height: 58px;
      background: var(--surface);
      border-top: 1px solid var(--gridline);
      border-left: 1px solid var(--gridline);
      margin-top: -1px;
      margin-left: -1px;
      position: relative;
      padding: 0.1875rem 0.3125rem;
    }
    .plan-view .cal-row:first-child .cal-day { border-top: none; margin-top: 0; }
    .plan-view .cal-daynum { position: absolute; top: 0.125rem; right: 0.25rem; font-size: 0.625rem; color: var(--muted); }

    /* Planned slot — muted chip underneath any actual run. */
    .plan-view .plan-slot {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted);
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 0.0625rem 0.3125rem;
      margin-top: 0.6875rem;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .plan-view .plan-slot.slot-rest { border-style: dotted; }
    .plan-view .plan-slot.slot-easy { border-color: color-mix(in srgb, var(--muted) 55%, var(--border)); color: var(--text-secondary); }
    .plan-view .plan-slot.slot-workout { border-color: var(--series-8); color: var(--series-8); }
    .plan-view .plan-slot.slot-long { border-color: var(--series-1); color: var(--series-1); }
    .plan-view .plan-slot.slot-race { border-color: var(--good); color: var(--good); }
    .plan-view .plan-slot.slot-strength { border-color: var(--series-5); color: var(--series-5); }

    /* Week note on the calendar leader — always-visible affordance (plain
       truncated text with a title for overflow), never hover-only. */
    .plan-view .cal-week-note {
      font-size: 0.625rem;
      color: var(--text-secondary);
      margin-top: 0.125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .plan-view .cal-day { cursor: pointer; }

    /* Today view — one kicker line, then a two-column at-a-glance grid:
       the session card is the hero on the left, the whole week's story
       (chips, meter, last-week comparison) stacks dense on the right.
       Width-capped so it reads as one unit, and short enough that the
       whole tab fits a desktop viewport without scrolling. */

    .plan-view .race-countdown { font-size: 0.875rem; color: var(--text-secondary); }
    .plan-view .race-countdown-num { font-size: 1.375rem; font-weight: 700; color: var(--text); margin-right: 0.375rem; }
    .plan-view .kicker-sub { font-size: 0.75rem; color: var(--muted); }

    .plan-view .today-grid {
      display: grid;
      grid-template-columns: minmax(280px, 2fr) 3fr;
      gap: 1rem;
      align-items: stretch;
      max-width: 66rem;
      margin-top: 0.75rem;
    }
    @media (max-width: 780px) {
      .plan-view .today-grid { grid-template-columns: 1fr; }
    }

    .plan-view .today-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .plan-view .panel-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .plan-view .today-card .panel-label { margin-bottom: 0.375rem; }
    .plan-view .today-slot {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.125rem;
    }
    .plan-view .today-title { font-size: 1.0625rem; font-weight: 650; color: var(--text); margin-bottom: 0.25rem; }
    .plan-view .today-rest, .plan-view .today-race, .plan-view .today-raceweek {
      font-size: 1.0625rem;
      font-weight: 650;
      color: var(--text);
      margin-bottom: 0.375rem;
    }
    .plan-view .today-raceweek { font-size: 0.8125rem; font-weight: 600; color: var(--accent); margin-bottom: 0.625rem; }
    .plan-view .today-targets { font-size: 0.8125rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; margin-bottom: 0.25rem; line-height: 1.6; }
    /* The session's lead figure ("6.0 mi", "8–10 × 3:00 @ …") — display size,
       so proportional figures, not tabular. */
    .plan-view .today-targets .target-lead {
      font-size: 1.5rem;
      font-weight: 650;
      color: var(--text);
      line-height: 1.2;
      font-variant-numeric: normal;
    }
    .plan-view .today-note { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.55; }
    .plan-view .today-done { margin-top: 0.375rem; }
    .plan-view .today-next {
      margin-top: auto;
      padding-top: 0.625rem;
      border-top: 1px solid var(--gridline);
    }
    .plan-view .today-next-line {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    /* Right column — the week, one card, hairline-divided rows. */
    .plan-view .week-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .plan-view .week-card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
    }
    .plan-view .week-headline { font-size: 0.9375rem; font-weight: 650; color: var(--text); font-variant-numeric: tabular-nums; }
    .plan-view .week-note-line {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .plan-view .week-shape { font-size: 0.75rem; color: var(--muted); }
    .plan-view .week-divider { border-top: 1px solid var(--gridline); margin: 0.25rem 0; }
    .plan-view .vs-row { display: flex; align-items: flex-end; gap: 1rem; flex-wrap: wrap; }
    .plan-view .vs-row .chart-legend { margin-top: 0; }

    .plan-view .day-chip-row { display: flex; gap: 0.375rem; margin: 0.125rem 0; }
    .plan-view .day-chip {
      flex: 1;
      min-width: 0;
      border-radius: 6px;
      padding: 0.375rem 0.125rem;
      text-align: center;
      cursor: pointer;
      border: 1.5px solid var(--chip-color);
      background: var(--surface);
    }
    .plan-view .day-chip-wd { font-size: 0.5625rem; font-weight: 600; text-transform: uppercase; color: var(--muted); }
    .plan-view .day-chip-num { font-size: 0.9375rem; font-weight: 700; color: var(--text); margin: 0.0625rem 0; }
    .plan-view .day-chip-slot { font-size: 0.5625rem; color: var(--chip-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .plan-view .day-chip.done { background: color-mix(in srgb, var(--chip-color) 16%, var(--surface)); }
    .plan-view .day-chip.today { border-width: 2px; box-shadow: 0 0 0 2px color-mix(in srgb, var(--chip-color) 30%, transparent); }
    .plan-view .day-chip.upcoming { border-style: dashed; }

    /* Expected-by-now meter — a single ratio against a limit, one accent hue;
       the marker is a plain neutral tick, not a second judgment color. */
    .plan-view .meter { position: relative; height: 8px; background: var(--gridline); border-radius: 4px; overflow: visible; margin-bottom: 0.375rem; }
    .plan-view .meter-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 4px; }
    .plan-view .meter-range { position: absolute; top: 0; bottom: 0; background: color-mix(in srgb, var(--accent) 18%, transparent); border-radius: 4px; }
    .plan-view .meter-mark { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--text-secondary); }

    .plan-view .paired-bar-wrap { margin: 0.375rem 0; }
    .plan-view .paired-bar-wrap svg { display: block; }

    /* Day detail popover — shared by the calendar and the Today strip. */
    .plan-view .day-popover-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .plan-view .day-popover {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      max-width: 22rem;
      width: calc(100% - 2rem);
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      position: relative;
    }
    .plan-view .day-popover-close {
      position: absolute;
      top: 0.5rem;
      right: 0.625rem;
      background: none;
      border: none;
      font-size: 1.25rem;
      line-height: 1;
      color: var(--muted);
      cursor: pointer;
    }
    .plan-view .day-popover-date { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.125rem; }
    .plan-view .day-popover-title { font-size: 1rem; font-weight: 650; color: var(--text); margin-bottom: 0.125rem; }
    .plan-view .day-popover-slot { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.625rem; }
    .plan-view .day-popover-targets { font-size: 0.8125rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; margin-bottom: 0.5rem; line-height: 1.6; }
    .plan-view .day-popover-note { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0.75rem; }
    .plan-view .day-popover-section { margin-top: 0.625rem; }
    .plan-view .day-popover-log { font-size: 0.8125rem; color: var(--text-secondary); padding: 0.125rem 0; }
    .plan-view .day-popover-empty { font-size: 0.8125rem; color: var(--muted); }

    /* Actual run — solid pill layered under/after the planned slot. */
    .plan-view .cal-run {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1.2;
      margin-top: 0.1875rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .plan-view .cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* plan_log annotation marker — small dot, top-left of the cell. */
    .plan-view .cal-log-marker {
      position: absolute;
      top: 0.1875rem;
      left: 0.25rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--series-3);
      cursor: help;
    }

    .plan-view .cal-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }
    .plan-view .cal-legend .cal-dot { margin-right: 0.3125rem; }

    /* Version history */
    .plan-view .version-list { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); overflow: hidden; }
    .plan-view .version-item { border-bottom: 1px solid var(--border); }
    .plan-view .version-item:last-child { border-bottom: none; }
    .plan-view .version-head {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.75rem 1.125rem;
      cursor: pointer;
    }
    .plan-view .version-head:hover { background: var(--bg); }
    .plan-view .version-tag {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }
    .plan-view .version-date { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
    .plan-view .version-author {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--bg);
      border-radius: 4px;
      padding: 0.0625rem 0.375rem;
      flex-shrink: 0;
    }
    .plan-view .version-note { font-size: 0.8125rem; color: var(--text-secondary); flex: 1; }
    .plan-view .version-toggle { font-size: 0.75rem; color: var(--accent); flex-shrink: 0; }
    .plan-view .version-diff {
      padding: 0 1.125rem 1rem;
      display: none;
    }
    .plan-view .version-diff.open { display: block; }
    .plan-view .diff-empty { font-size: 0.8125rem; color: var(--muted); padding: 0.5rem 0; }
    .plan-view .diff-week {
      display: flex;
      gap: 0.75rem;
      align-items: baseline;
      font-size: 0.8125rem;
      padding: 0.25rem 0;
      border-top: 1px solid var(--gridline);
    }
    .plan-view .diff-week:first-child { border-top: none; }
    .plan-view .diff-week-start { font-weight: 600; color: var(--text); flex-shrink: 0; width: 5.5rem; }
    .plan-view .diff-tag {
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .plan-view .diff-tag.added { color: var(--good); background: var(--pr-bg); }
    .plan-view .diff-tag.removed { color: var(--series-6); background: color-mix(in srgb, var(--series-6) 12%, var(--surface)); }
    .plan-view .diff-tag.changed { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface)); }
    .plan-view .diff-fields { color: var(--muted); }

    /* Retrospective — replaces the forward stat strip once a plan
       completes. The plan-vs-detected-build comparison reuses the site's
       bare <table>/.scroll styling from theme.css, not a bespoke component. */
    .plan-view .retro-note { font-size: 0.8125rem; color: var(--muted); margin-bottom: 0.75rem; }
    .plan-view .retro-link { color: inherit; text-decoration: none; }
    .plan-view .retro-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<script src="/nav.js"></script>
<script src="/charts.js"></script>

<main class="plan-view">
  <h1>Plan</h1>
  <p class="subtitle" id="subtitle">Loading…</p>
  <div id="root"></div>
</main>

<script>
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g,
      ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  function shortDate(dateStr) {
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function longDate(dateStr) {
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function addDays(dateStr, n) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  const DIST_LABEL = { '5K': '5K', '10K': '10K', '15K': '15K', '10M': '10M', half: 'Half', '30K': '30K', marathon: 'Marathon', '50K': '50K' };
  function distLabel(bucket) { return DIST_LABEL[bucket] ?? bucket; }

  const TYPE_COLOR = {
    long_run: 'var(--series-1)',
    workout: 'var(--series-8)',
    race: 'var(--good)',
    easy: 'var(--muted)',
  };

  const SLOT_LABEL = { easy: 'Easy', workout: 'Workout', long: 'Long', rest: 'Rest', race: 'Race', strength: 'Strength' };

  // Planned-slot palette — one entry per plan.py SLOTS value, colors matching
  // TYPE_COLOR's actual-run-type mapping above (long/workout/race/easy share
  // the same hue whether the source is a synced run or a planned slot).
  // 'strength' has no synced-run counterpart in TYPE_COLOR (no page colors
  // WeightTraining runs), so it gets its own slot: --series-5 (violet), the
  // most CVD-distinct unused slot against the four already in use. Terrain is
  // never a color — a trail day gets the ▲ glyph instead (TRAIL_GLYPH below).
  const SLOT_COLOR = {
    easy: 'var(--muted)',
    workout: 'var(--series-8)',
    long: 'var(--series-1)',
    race: 'var(--good)',
    strength: 'var(--series-5)',
    rest: 'var(--baseline)',
  };
  const TRAIL_GLYPH = ' ▲'; // ▲ — terrain modifier, never a color (a trail long run is still a long run)

  const MILE_M = 1609.34;

  // 6.0 -> "6", 7.5 -> "7.5" — chip-sized mileage, no trailing zero.
  function trimMiles(v) {
    const s = v.toFixed(1);
    return s.endsWith('.0') ? s.slice(0, -2) : s;
  }

  // decimal minutes (150) -> "2:30"; whole minutes under an hour -> "30 min".
  function fmtDuration(min) {
    if (min == null) return null;
    const h = Math.floor(min / 60);
    const m = Math.round(min % 60);
    return h > 0 ? `${h}:${String(m).padStart(2, '0')}` : `${m} min`;
  }

  // seconds (180) -> "3:00" — rep durations, distinct from fmt.time/fmt.timeShort
  // (both h:mm-first, wrong shape for a sub-hour rep).
  function fmtMinSec(s) {
    if (s == null) return null;
    const m = Math.floor(s / 60);
    const sec = String(Math.round(s % 60)).padStart(2, '0');
    return `${m}:${sec}`;
  }

  // A week's target_miles/target_miles_hi as the label a coach would say:
  // "38–42" for a range, "38.0" for a point, "workouts only" when both are
  // NULL (deliberately unspecified — scored on workouts alone, see roadmap).
  function targetMilesLabel(w) {
    if (w.target_miles == null) return 'workouts only';
    if (w.target_miles_hi != null) return `${w.target_miles.toFixed(0)}–${w.target_miles_hi.toFixed(0)}`;
    return w.target_miles.toFixed(1);
  }

  // Natural-language rendering of one plan_days row's target: rep range/
  // duration/pace ("8–10 × 3:00 @ 6:50–7:10/mi"), then the day-level mileage
  // or duration target ("2:30 trail long"). Shared by the Today card, the
  // week glance, and the day popover so the three views never describe a
  // day's target differently.
  function describeDayTarget(day) {
    if (!day) return [];
    const lines = [];
    const t = day.target || {};
    let reps = null;
    if (t.reps_lo != null && t.reps_hi != null) reps = `${t.reps_lo}–${t.reps_hi}`;
    else if (t.reps != null) reps = `${t.reps}`;
    let unit = null;
    if (t.rep_duration_s != null) unit = fmtMinSec(t.rep_duration_s);
    else if (t.rep_distance_m != null) unit = `${(t.rep_distance_m / MILE_M).toFixed(2)}mi`;
    let pace = null;
    if (t.pace_lo != null && t.pace_hi != null) pace = `${fmt.pace(t.pace_lo)}–${fmt.pace(t.pace_hi)}/mi`;
    if (reps && unit) {
      lines.push(`${reps} × ${unit}${pace ? ` @ ${pace}` : ''}`);
    } else if (pace) {
      lines.push(`@ ${pace}`);
    } else if (t.zone_name) {
      lines.push(`${t.zone_name} pace`);
    }
    if (day.terrain === 'trail' && pace) lines.push('trail — pace is guidance only, not judged');

    if (day.target_minutes != null) {
      const slotWord = (SLOT_LABEL[day.slot] ?? day.slot).toLowerCase();
      lines.push(`${fmtDuration(day.target_minutes)}${day.terrain === 'trail' ? ' trail' : ''} ${slotWord}`);
    } else if (day.target_miles != null) {
      lines.push(`${day.target_miles.toFixed(1)} mi`);
    }
    return lines;
  }

  // "long run and one workout still ahead" — the shape of what's left this
  // week, from the plan's remaining (non-rest) days, never from a raw count.
  function remainingShape(remainingDays) {
    if (!remainingDays || !remainingDays.length) return 'nothing left on the schedule this week';
    const counts = {};
    remainingDays.forEach(d => { counts[d.slot] = (counts[d.slot] || 0) + 1; });
    const parts = [];
    if (counts.long) parts.push('the long run');
    if (counts.workout) parts.push(counts.workout === 1 ? 'one workout' : `${counts.workout} workouts`);
    if (counts.strength) parts.push(counts.strength === 1 ? 'one strength day' : `${counts.strength} strength days`);
    if (counts.easy) parts.push(`${counts.easy} easy day${counts.easy > 1 ? 's' : ''}`);
    if (counts.race) parts.push('race day');
    if (!parts.length) return 'nothing left on the schedule this week';
    return `${parts.join(' and ')} still ahead`;
  }

  // Adherence bands — read straight off theme.css so light/dark both work,
  // same idiom as chartTheme() in nav.js but scoped to the three band colors.
  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  const BAND_COLOR = { on: 'var(--good)', close: 'var(--series-3)', off: 'var(--series-6)' };
  const BAND_LABEL = { on: 'On plan', close: 'Close', off: 'Off plan' };

  // Flag shading on the weekly chart — one markArea per active flag,
  // spanning the consecutive weeks it summarizes. Colors echo the pattern's
  // nature: mileage flags reuse the "off" red, workout-count flags reuse the
  // calendar's workout orange, long-run flags reuse the calendar's long-run blue.
  const FLAG_COLOR = {
    mileage_off_low: '--series-6',
    mileage_off_high: '--series-6',
    workout_count_short: '--series-8',
    long_run_missed: '--series-1',
  };
  const FLAG_LABEL = {
    mileage_off_low: 'Mileage low',
    mileage_off_high: 'Mileage high',
    workout_count_short: 'Workouts short',
    long_run_missed: 'Long run missed',
  };

  // -----------------------------------------------------------------------
  // View tabs — house idiom (see races.html): buttons toggle .active on
  // click, panels toggle the `hidden` attribute, hash-routed with
  // history.replaceState so back doesn't step through tabs. Only built for
  // an active plan with a Today to show; a completed plan's retrospective
  // renders straight into #root with no tabs at all, unchanged from v1.
  // -----------------------------------------------------------------------

  const PLAN_TABS = ['today', 'overall'];

  // ECharts measures its container at init, and every Overall chart is built
  // while #tab-overall is hidden (zero-size) — so each instance registers
  // here and gets re-measured whenever the tab is shown.
  const OVERALL_CHARTS = [];

  // Every Overall-section render function inserts here — #tab-overall when
  // tabs exist, #root directly when they don't (completed-plan retrospective,
  // no Today to tab away from).
  function rootEl() {
    return document.getElementById('tab-overall') ?? document.getElementById('root');
  }

  function renderTabs() {
    document.getElementById('root').insertAdjacentHTML('beforeend', `
      <div class="mode-tabs" id="plan-tabs">
        <button class="mode-tab" data-tab="today">Today</button>
        <button class="mode-tab" data-tab="overall">Overall</button>
      </div>
      <div id="tab-today" class="tab-panel"></div>
      <div id="tab-overall" class="tab-panel" hidden></div>`);
    document.querySelectorAll('#plan-tabs .mode-tab').forEach(btn => {
      btn.addEventListener('click', () => activatePlanTab(btn.dataset.tab));
    });
  }

  function activatePlanTab(key) {
    if (!PLAN_TABS.includes(key)) key = 'today';
    document.querySelectorAll('#plan-tabs .mode-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === key));
    document.querySelectorAll('.tab-panel').forEach(el => { el.hidden = el.id !== `tab-${key}`; });
    if (key === 'overall') OVERALL_CHARTS.forEach(c => c.resize());
    history.replaceState(null, '', `#${key}`);
  }

  // -----------------------------------------------------------------------
  // Day detail popover — shared by the calendar (day cells + week leaders)
  // and the Today strip (session card + day-glance chips). Reads off the
  // already-fetched PLAN_DATA rather than issuing a new request — every
  // field it shows (day target, note, matched runs, log entries) is already
  // in the /api/plan payload.
  // -----------------------------------------------------------------------

  let PLAN_DATA = null; // { dayByDate, actualByDate, logByDate } — set once on load

  function dayPopoverHTML(dateStr, day, runs, logs) {
    const glyph = day && day.terrain === 'trail' ? TRAIL_GLYPH : '';
    const title = day ? (day.title ? esc(day.title) : (SLOT_LABEL[day.slot] ?? day.slot)) : 'Rest';
    const targetLines = describeDayTarget(day);
    return `
      <div class="day-popover-backdrop" id="day-popover-backdrop">
        <div class="day-popover" role="dialog" aria-modal="true">
          <button class="day-popover-close" id="day-popover-close" aria-label="Close">×</button>
          <div class="day-popover-date">${esc(longDate(dateStr))}</div>
          <div class="day-popover-title">${title}${glyph}</div>
          ${day ? `<div class="day-popover-slot" style="color:${SLOT_COLOR[day.slot] ?? 'var(--text)'}">${esc(SLOT_LABEL[day.slot] ?? day.slot)}</div>` : ''}
          ${targetLines.length ? `<div class="day-popover-targets">${targetLines.map(l => `<div>${esc(l)}</div>`).join('')}</div>` : ''}
          ${day && day.note ? `<p class="day-popover-note">${esc(day.note)}</p>` : ''}
          ${runs.length ? `<div class="day-popover-section"><div class="subchart-label">Synced</div>${runs.map(runLine).join('')}</div>` : ''}
          ${logs.length ? `<div class="day-popover-section"><div class="subchart-label">Log</div>${logs.map(l => `<div class="day-popover-log">${esc(l.action)}${l.reason ? ': ' + esc(l.reason) : ''}</div>`).join('')}</div>` : ''}
          ${!day && !runs.length && !logs.length ? `<p class="day-popover-empty">No plan data for this day.</p>` : ''}
        </div>
      </div>`;
  }

  function openDayPopover(dateStr) {
    if (!PLAN_DATA) return;
    const day = PLAN_DATA.dayByDate.get(dateStr) ?? null;
    const runs = PLAN_DATA.actualByDate.get(dateStr) ?? [];
    const logs = PLAN_DATA.logByDate.get(dateStr) ?? [];
    if (!day && !runs.length && !logs.length) return; // nothing to show for this date
    // Must land inside main.plan-view — every popover style is scoped under
    // it, and a body-level insert renders as unstyled text at the page bottom.
    document.querySelector('main.plan-view').insertAdjacentHTML('beforeend', dayPopoverHTML(dateStr, day, runs, logs));
    const backdrop = document.getElementById('day-popover-backdrop');
    function close() {
      backdrop.remove();
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') close(); }
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
    document.getElementById('day-popover-close').addEventListener('click', close);
    document.addEventListener('keydown', onKey);
  }

  // -----------------------------------------------------------------------
  // Empty state
  // -----------------------------------------------------------------------

  function renderEmpty() {
    document.getElementById('subtitle').textContent = 'No active plan.';
    document.getElementById('root').innerHTML = `
      <div class="plan-empty">
        <h2>No training plan yet</h2>
        <p>Once a plan is drafted, this page tracks planned vs actual weekly mileage,
        a day-by-day calendar, and the version history as the plan evolves.</p>
        <p style="margin-top:0.75rem">Draft one in conversation with <code>/miles-plan</code> —
        it pulls your fitness estimate, past builds, and historical ramp/workout cadence,
        proposes a week-by-week skeleton, and writes it only once you approve.</p>
      </div>`;
  }

  // -----------------------------------------------------------------------
  // Stat strip
  // -----------------------------------------------------------------------

  function renderStatStrip(data, adherence) {
    const { plan, version, weeks_to_race, this_week, goal } = data;

    const weeksToRaceStat = `
      <div class="stat">
        <div class="stat-label">Weeks to race</div>
        <div class="stat-value">${weeks_to_race}<span class="stat-sub">${shortDate(plan.race_date)}</span></div>
      </div>`;

    const thisWeekStat = this_week ? `
      <div class="stat">
        <div class="stat-label">This week</div>
        <div class="stat-value">${this_week.actual_miles.toFixed(1)}<span class="stat-sub">of ${targetMilesLabel(this_week)} mi</span></div>
        <div class="stat-sub">${this_week.actual_workouts} of ${this_week.target_workouts} workouts</div>
      </div>` : `
      <div class="stat">
        <div class="stat-label">This week</div>
        <div class="stat-value">—<span class="stat-sub">outside plan window</span></div>
      </div>`;

    const goalStat = goal ? `
      <div class="stat">
        <div class="stat-label">Goal vs fitness</div>
        <div class="stat-value">${fmt.time(goal.goal_time_s)}<span class="stat-sub">goal</span></div>
        <div class="stat-sub">${goal.equivalent_time_s != null ? `${fmt.time(Math.round(goal.equivalent_time_s))} implied (${goal.confidence})` : 'no current fitness estimate'}</div>
      </div>` : '';

    const versionStat = version ? `
      <div class="stat">
        <div class="stat-label">Version</div>
        <div class="stat-value">v${version.version_n}<span class="stat-sub">${version.author}</span></div>
        <div class="stat-sub">revised ${shortDate(version.created_at.slice(0, 10))}</div>
      </div>` : '';

    const adherenceStat = adherence ? `
      <div class="stat">
        <div class="stat-label">Adherence</div>
        <div class="stat-value">${adherence.on_or_close}<span class="stat-sub">of ${adherence.completed} weeks on plan</span></div>
      </div>` : '';

    rootEl().insertAdjacentHTML('beforeend', `
      <div class="stat-strip">
        ${weeksToRaceStat}
        ${thisWeekStat}
        ${goalStat}
        ${versionStat}
        ${adherenceStat}
      </div>`);
  }

  // -----------------------------------------------------------------------
  // Race retrospective — replaces the forward-looking stat strip once
  // /api/plan reports plan.status === 'completed'. Reads /api/plan-
  // retrospective for the numbers the forward stats can't answer: final
  // adherence, race result vs goal vs a pre-race fitness prediction, and the
  // plan's target ramp vs what detect_builds() independently saw. The
  // weekly-mileage chart, calendar, and version history below are unchanged
  // — "the record of what happened" stays visible either way.
  // -----------------------------------------------------------------------

  function buildCompareTable(ramp, build) {
    if (!ramp && !build) return '';
    const rows = [
      ['Weeks', ramp ? ramp.weeks : null, build.found ? build.weeks : null],
      ['Avg weekly miles', ramp ? ramp.avg_target_miles.toFixed(1) : null, build.avg_mpw != null ? build.avg_mpw.toFixed(1) : null],
      ['Peak', ramp ? ramp.peak_target_miles.toFixed(1) : null, build.peak_3wk_avg != null ? `${build.peak_3wk_avg.toFixed(1)} (3wk avg)` : null],
    ];
    const note = build.found
      ? `bounded by ${esc(build.bounded_by ?? '—')}${build.thin ? ' · thin build' : ''}, starting ${build.start ? shortDate(build.start) : '—'}`
      : `detect_builds found no race-anchored build for this race (below its anchor-distance floor, or too little surrounding volume) — plan-only numbers shown`;
    return `
      <div class="scroll" style="margin-top:0.75rem">
        <table>
          <thead><tr><th></th><th class="r">Plan</th><th class="r">Detected build</th></tr></thead>
          <tbody>
            ${rows.map(([label, a, b]) => `<tr><td>${label}</td><td class="r">${a ?? '—'}</td><td class="r">${b ?? '—'}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
      <p class="chart-caption">${esc(note)}</p>`;
  }

  function renderRetrospective(data, retro) {
    const { plan } = data;
    if (!retro) {
      rootEl().insertAdjacentHTML('beforeend', `
        <div class="stat-strip"><div class="stat">
          <div class="stat-label">Retrospective</div>
          <div class="stat-value">—<span class="stat-sub">loading…</span></div>
        </div></div>`);
      return;
    }

    const fa = retro.final_adherence;
    const adherenceStat = fa ? `
      <div class="stat">
        <div class="stat-label">Final adherence</div>
        <div class="stat-value">${fa.weeks_on_or_close}<span class="stat-sub">of ${fa.weeks_completed} weeks</span></div>
        <div class="stat-sub">${fa.pct_of_planned_miles != null ? `${Math.round(fa.pct_of_planned_miles)}% of planned miles` : ''}</div>
      </div>` : '';

    const race = retro.race;
    const raceStat = race ? `
      <div class="stat">
        <div class="stat-label">Race result</div>
        <div class="stat-value">
          <a class="retro-link" href="/build.html#${race.date}" title="View build">${esc(race.finish_time)}</a>
          <span class="stat-sub">${esc(race.name ?? '')}</span>
        </div>
        <div class="stat-sub">${race.pace_min_per_mile != null ? `${fmt.pace(race.pace_min_per_mile)}/mi` : ''}</div>
      </div>` : `
      <div class="stat">
        <div class="stat-label">Race result</div>
        <div class="stat-value">—<span class="stat-sub">no matching synced race</span></div>
      </div>`;

    const goal = retro.goal;
    const goalStat = (goal.goal_time_s != null || goal.predicted_time_s != null) ? `
      <div class="stat">
        <div class="stat-label">Goal vs predicted</div>
        <div class="stat-value">${goal.goal_time_s != null ? fmt.time(goal.goal_time_s) : '—'}<span class="stat-sub">goal</span></div>
        <div class="stat-sub">${goal.predicted_time != null ? `${goal.predicted_time} predicted (${esc(goal.predicted_confidence ?? '')})` : 'no pre-race fitness estimate'}</div>
      </div>` : '';

    rootEl().insertAdjacentHTML('beforeend', `
      <section id="section-retrospective">
        <h2>Race retrospective</h2>
        <p class="desc">${esc(plan.title)} closed out ${shortDate(plan.race_date)}</p>
        <div class="stat-strip">
          ${adherenceStat}
          ${raceStat}
          ${goalStat}
        </div>
        ${buildCompareTable(retro.plan_ramp, retro.detected_build)}
      </section>`);
  }

  // -----------------------------------------------------------------------
  // Planned-vs-actual weekly chart
  // -----------------------------------------------------------------------

  // Computed, numbers-first caption for the weekly-mileage chart — first vs
  // last COMPLETED week's actual/target miles, spanning however many
  // completed weeks exist. "" (and no <p>) below 2 completed weeks.
  function mileageCaption(weeks) {
    // Unspecified weeks (no target_miles) have nothing to average into a
    // target caption — excluded here, same as plan_ramp's rollup.
    const completed = weeks.filter(w => !w.is_current && !w.is_future && w.target_miles != null);
    if (completed.length < 2) return '';
    const first = completed[0], last = completed[completed.length - 1];
    return `weekly mileage ${first.actual_miles.toFixed(0)}→${last.actual_miles.toFixed(0)} mi ` +
      `over ${completed.length} weeks (target ${targetMilesLabel(first)}→${targetMilesLabel(last)})`;
  }

  // One markArea span per active flag, covering the consecutive weeks
  // it summarizes — a visual echo of the flags panel below, right on the
  // chart where the pattern actually happened.
  function flagMarkAreas(flags) {
    if (!flags || !flags.length) return [];
    return flags.map(f => {
      const color = withAlpha(cssVar(FLAG_COLOR[f.type] ?? '--muted'), 0.16);
      return [
        { xAxis: f.since, itemStyle: { color }, label: { show: false } },
        { xAxis: addDays(f.since, f.weeks * 7) },
      ];
    });
  }

  function renderChart(data, bandByWeek, flags) {
    const { weeks } = data;
    if (!weeks.length) return;

    const hasBands = bandByWeek && bandByWeek.size > 0;
    const hasFlags = flags && flags.length > 0;
    const caption = mileageCaption(weeks);
    const flagTypesPresent = hasFlags ? [...new Set(flags.map(f => f.type))] : [];

    rootEl().insertAdjacentHTML('beforeend', `
      <section id="section-chart">
        <h2>Weekly mileage</h2>
        <p class="desc">Bars are actual synced miles${hasBands ? ', colored by adherence band' : ''} · dashed line is the planned weekly target · current week is still in progress${hasFlags ? ' · shaded span marks a flagged pattern' : ''}</p>
        <div class="chart-wrap"><div id="chart-weekly" style="width:100%;height:100%"></div></div>
        <div class="chart-legend">
          ${hasBands ? `
          <span class="legend-swatch"><span class="legend-box" style="background:${cssVar('--good')}"></span>On plan</span>
          <span class="legend-swatch"><span class="legend-box" style="background:${cssVar('--series-3')}"></span>Close</span>
          <span class="legend-swatch"><span class="legend-box" style="background:${cssVar('--series-6')}"></span>Off plan</span>
          ` : `<span class="legend-swatch"><span class="legend-box" style="background:var(--series-2)"></span>Actual miles</span>`}
          <span class="legend-swatch"><span class="legend-line"></span>Planned target</span>
          ${flagTypesPresent.map(t => `<span class="legend-swatch"><span class="legend-box" style="background:${withAlpha(cssVar(FLAG_COLOR[t] ?? '--muted'), 0.5)}"></span>${FLAG_LABEL[t] ?? t}</span>`).join('')}
        </div>
        ${caption ? `<p class="chart-caption">${esc(caption)}</p>` : ''}
      </section>`);

    const theme = chartTheme();
    const barData = weeks.map(w => {
      const band = bandByWeek ? bandByWeek.get(w.week_start) : undefined;
      const base = band ? cssVar(`--${band === 'on' ? 'good' : band === 'close' ? 'series-3' : 'series-6'}`) : theme.series[1];
      return {
        value: [w.week_start, w.actual_miles],
        itemStyle: w.is_current
          ? { color: withAlpha(base, 0.55), borderRadius: [2, 2, 0, 0] }
          : { color: base, borderRadius: [2, 2, 0, 0] },
      };
    });
    // Range weeks plot at the midpoint of [lo, hi]; unspecified weeks (both
    // NULL) leave a gap in the dashed line, same as any week with no target.
    const lineData = weeks.map(w => [
      w.week_start,
      w.target_miles == null ? null : w.target_miles_hi != null ? (w.target_miles + w.target_miles_hi) / 2 : w.target_miles,
    ]);
    const markArea = hasFlags ? { silent: true, data: flagMarkAreas(flags) } : undefined;

    const chart = echarts.init(document.getElementById('chart-weekly'));
    OVERALL_CHARTS.push(chart);
    chart.setOption({
      animation: false,
      grid: { top: 24, right: 24, bottom: 32, left: 48 },
      tooltip: {
        trigger: 'axis',
        backgroundColor: theme.surface,
        borderColor: theme.gridline,
        textStyle: { fontSize: 12, color: theme.text },
        formatter(params) {
          // Index by dataIndex, not axisValue — on a time-type x axis, axisValue
          // is a numeric timestamp, not the original 'YYYY-MM-DD' week_start string.
          const w = weeks[params[0].dataIndex];
          if (!w) return '';
          const tag = w.is_current ? ' (in progress)' : w.is_future ? ' (upcoming)' : '';
          const band = bandByWeek ? bandByWeek.get(w.week_start) : undefined;
          const bandLine = band ? `<br>${BAND_LABEL[band]}` : '';
          return `<div style="font-weight:600;margin-bottom:2px;color:${theme.text}">${shortDate(w.week_start)}${tag}</div>
            Actual: ${w.actual_miles.toFixed(1)} mi<br>
            Target: ${targetMilesLabel(w)} mi · ${w.phase}${bandLine}`;
        },
      },
      xAxis: {
        type: 'time',
        axisLine: { lineStyle: { color: theme.gridline } },
        axisTick: { show: false },
        axisLabel: { fontSize: 11, color: theme.muted },
      },
      yAxis: {
        type: 'value',
        name: 'Miles',
        nameLocation: 'middle',
        nameGap: 34,
        nameTextStyle: { fontSize: 11, color: theme.muted },
        axisLine: { show: false },
        axisTick: { show: false },
        splitLine: { lineStyle: { color: theme.gridline } },
        axisLabel: { fontSize: 11, color: theme.muted },
      },
      series: [
        {
          name: 'Actual miles',
          type: 'bar',
          data: barData,
          barMaxWidth: 16,
          z: 2,
          markArea,
        },
        {
          name: 'Planned target',
          type: 'line',
          data: lineData,
          step: 'end',
          showSymbol: false,
          lineStyle: { color: theme.muted, width: 2, type: 'dashed' },
          z: 3,
        },
      ],
    });
    window.addEventListener('resize', () => chart.resize());
  }

  // -----------------------------------------------------------------------
  // Weekly calendar
  // -----------------------------------------------------------------------

  function mondayOf(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const dow = (d.getDay() + 6) % 7; // Mon=0..Sun=6
    d.setDate(d.getDate() - dow);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  function runLine(r) {
    const color = TYPE_COLOR[r.run_type] ?? 'var(--muted)';
    const titleParts = [esc(r.name ?? '')];
    if (r.pace_min_per_mile != null) titleParts.push(`${fmt.pace(r.pace_min_per_mile)}/mi`);
    const title = titleParts.join(' · ');
    return `<div class="cal-run" title="${title}">
      <span class="cal-dot" style="background:${color}"></span>
      <span>${r.distance_mi.toFixed(1)} mi</span>
    </div>`;
  }

  function plannedSlot(day) {
    if (!day) return '';
    const glyph = day.terrain === 'trail' ? TRAIL_GLYPH : '';
    if (day.slot === 'rest' && !day.title && day.target_miles == null) {
      return `<div class="plan-slot slot-rest">Rest${glyph}</div>`;
    }
    const label = day.title ? esc(day.title) : SLOT_LABEL[day.slot] ?? day.slot;
    const extras = [];
    if (day.target_miles != null) extras.push(`${day.target_miles.toFixed(1)}mi`);
    if (day.target_minutes != null) extras.push(fmtDuration(day.target_minutes));
    const suffix = extras.length ? ` · ${extras.join(' · ')}` : '';
    return `<div class="plan-slot slot-${day.slot}" title="${esc(label)}${suffix}">${label}${glyph}${suffix}</div>`;
  }

  function logMarker(entries) {
    if (!entries || !entries.length) return '';
    const title = entries.map(e => `${e.action}${e.reason ? ': ' + e.reason : ''}`).join(' · ');
    return `<div class="cal-log-marker" title="${esc(title)}"></div>`;
  }

  function dayCell(dateStr, dayByDate, actualByDate, logByDate) {
    const day = dayByDate.get(dateStr);
    const runs = actualByDate.get(dateStr) ?? [];
    const logs = logByDate.get(dateStr) ?? [];
    const dayNum = Number(dateStr.slice(8, 10));
    return `<div class="cal-day" data-plan-date="${dateStr}">
      ${logMarker(logs)}
      <div class="cal-daynum">${dayNum}</div>
      ${plannedSlot(day)}
      ${runs.map(runLine).join('')}
    </div>`;
  }

  function bandChip(band) {
    if (!band) return '';
    return `<div class="band-chip" style="background:${BAND_COLOR[band]}" title="${BAND_LABEL[band]}">${band}</div>`;
  }

  function weekRow(week, dayByDate, actualByDate, logByDate, bandByWeek) {
    const days = Array.from({ length: 7 }, (_, i) => addDays(week.week_start, i));
    const rowClass = week.is_current ? 'cal-row current' : 'cal-row';
    const band = bandByWeek ? bandByWeek.get(week.week_start) : undefined;
    return `<div class="${rowClass}">
      <div class="cal-leader">
        <div>${shortDate(week.week_start)}</div>
        <div class="tile-sub">${week.phase} · ${week.actual_miles.toFixed(1)} of ${targetMilesLabel(week)} mi</div>
        ${week.note ? `<div class="cal-week-note" title="${esc(week.note)}">${esc(week.note)}</div>` : ''}
        ${bandChip(band)}
      </div>
      ${days.map(d => dayCell(d, dayByDate, actualByDate, logByDate)).join('')}
    </div>`;
  }

  function renderCalendar(data, bandByWeek) {
    const { weeks, days, actual, log } = data;
    if (!weeks.length) return;

    const dayByDate = new Map(days.map(d => [d.date, d]));
    const actualByDate = new Map(Object.entries(actual ?? {}));
    const logByDate = new Map(Object.entries(log ?? {}));
    const weekdayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const hasBands = bandByWeek && bandByWeek.size > 0;

    rootEl().insertAdjacentHTML('beforeend', `
      <section id="section-calendar">
        <h2>Calendar</h2>
        <p class="desc">Dashed chip is the planned slot, colored by type · filled pill is the synced run · dot marker is a plan_log note · ▲ marks a trail day · click any day or week for detail${hasBands ? ' · colored chip is the completed week’s adherence band' : ''} · current week highlighted</p>
        <div class="cal">
          <div class="cal-header">
            <div class="cal-hcell"></div>
            ${weekdayLabels.map(w => `<div class="cal-hcell">${w}</div>`).join('')}
          </div>
          ${weeks.map(w => weekRow(w, dayByDate, actualByDate, logByDate, bandByWeek)).join('')}
        </div>
        <div class="cal-legend">
          <span><span class="cal-dot" style="background:var(--muted)"></span>Easy</span>
          <span><span class="cal-dot" style="background:var(--series-8)"></span>Workout</span>
          <span><span class="cal-dot" style="background:var(--series-1)"></span>Long run</span>
          <span><span class="cal-dot" style="background:var(--good)"></span>Race</span>
          <span><span class="cal-dot" style="background:var(--series-5)"></span>Strength</span>
          <span>▲ Trail</span>
          <span><span class="cal-log-marker" style="position:static;display:inline-block;margin-right:0.3125rem"></span>Log note</span>
        </div>
      </section>`);
  }

  // -----------------------------------------------------------------------
  // Flags panel — renders nothing at all when there are no active
  // flags. Silence is the common case by design: patterns are rare and
  // flags only fire on 2+ consecutive completed weeks, never a single miss.
  // -----------------------------------------------------------------------

  function renderFlags(adherence) {
    if (!adherence || !adherence.flags || !adherence.flags.length) return;

    rootEl().insertAdjacentHTML('beforeend', `
      <section id="section-flags">
        <h2>Flags</h2>
        <p class="desc">Patterns only — 2+ consecutive completed weeks, never a single day or week</p>
        <div class="flags-panel">
          ${adherence.flags.map(f => `
            <div class="flag-item">
              <span class="flag-dot"></span>
              <span>${esc(f.message)}</span>
            </div>`).join('')}
        </div>
      </section>`);
  }

  // -----------------------------------------------------------------------
  // Easy HR/pace progression — two stacked mini-charts (pace, HR) over
  // the same continuous plan-window x-axis rather than one dual-axis chart:
  // pace and HR are different units/scales, and this codebase never puts two
  // y-scales on one chart (see training.html's fitness chart / weekly-history
  // chart, both single-axis). Apparent temperature is a tooltip-only
  // annotation, not a plotted line — context, not a third scale.
  // -----------------------------------------------------------------------

  function renderProgressionEasy(progression) {
    if (!progression || !progression.weeks.length) return;
    const { weeks, easy, captions } = progression;

    rootEl().insertAdjacentHTML('beforeend', `
      <section id="section-progression-easy">
        <h2>Easy HR/pace progression</h2>
        <p class="desc">Distance-weighted average over each week's easy runs · gaps are weeks with no easy run synced · hover for average apparent temperature</p>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          <div style="flex:1;min-width:280px">
            <div class="subchart-label">Pace</div>
            <div class="chart-wrap-small"><div id="chart-easy-pace" style="width:100%;height:100%"></div></div>
          </div>
          <div style="flex:1;min-width:280px">
            <div class="subchart-label">Heart rate</div>
            <div class="chart-wrap-small"><div id="chart-easy-hr" style="width:100%;height:100%"></div></div>
          </div>
        </div>
        ${captions && captions.easy ? `<p class="chart-caption">${esc(captions.easy)}</p>` : ''}
      </section>`);

    const theme = chartTheme();
    const paceData = weeks.map((ws, i) => [ws, easy[i].avg_pace_min_per_mile]);
    const hrData = weeks.map((ws, i) => [ws, easy[i].avg_hr]);

    function tooltipFor(params) {
      const i = params[0].dataIndex;
      const e = easy[i];
      if (!e) return '';
      const parts = [];
      if (e.avg_pace_min_per_mile != null) parts.push(`Pace: ${fmt.pace(e.avg_pace_min_per_mile)}/mi`);
      if (e.avg_hr != null) parts.push(`HR: ${e.avg_hr}`);
      if (e.avg_apparent_temp_f != null) parts.push(`Feels like: ${Math.round(e.avg_apparent_temp_f)}°F`);
      parts.push(`${e.run_count} easy run${e.run_count === 1 ? '' : 's'}`);
      return `<div style="font-weight:600;margin-bottom:2px;color:${theme.text}">${shortDate(e.week_start)}</div>${parts.join('<br>')}`;
    }

    function baseOption(name, data, extraYAxis) {
      return {
        animation: false,
        grid: { top: 16, right: 20, bottom: 28, left: 48 },
        tooltip: {
          trigger: 'axis',
          backgroundColor: theme.surface,
          borderColor: theme.gridline,
          textStyle: { fontSize: 12, color: theme.text },
          formatter: tooltipFor,
        },
        xAxis: {
          type: 'time',
          axisLine: { lineStyle: { color: theme.gridline } },
          axisTick: { show: false },
          axisLabel: { fontSize: 10, color: theme.muted },
        },
        yAxis: Object.assign({
          type: 'value',
          axisLine: { show: false },
          axisTick: { show: false },
          splitLine: { lineStyle: { color: theme.gridline } },
          axisLabel: { fontSize: 10, color: theme.muted },
        }, extraYAxis),
        series: [{
          name,
          type: 'line',
          data,
          connectNulls: false,
          showSymbol: true,
          symbolSize: 6,
          lineStyle: { color: theme.series[0], width: 2 },
          itemStyle: { color: theme.series[0] },
        }],
      };
    }

    const paceChart = echarts.init(document.getElementById('chart-easy-pace'));
    paceChart.setOption(baseOption('Easy pace', paceData, { inverse: true, axisLabel: { fontSize: 10, color: theme.muted, formatter: fmt.pace } }));
    OVERALL_CHARTS.push(paceChart);

    const hrChart = echarts.init(document.getElementById('chart-easy-hr'));
    hrChart.setOption(baseOption('Easy HR', hrData, {}));
    OVERALL_CHARTS.push(hrChart);

    window.addEventListener('resize', () => { paceChart.resize(); hrChart.resize(); });
  }

  // -----------------------------------------------------------------------
  // Workout pace progression — one dot per matched workout vs its
  // frozen target band (drawn as a floating bar: an invisible base stacked
  // under a visible range, ECharts' standard "range bar" idiom), with
  // fitness_checkpoints' monthly 5K pace as a subtle background reference
  // line, per training.html's checkpoint treatment but deliberately muted
  // here — it's context, not the headline.
  // -----------------------------------------------------------------------

  function renderProgressionWorkouts(progression) {
    if (!progression || !progression.weeks.length) return;
    const { weeks, workouts, checkpoints, captions } = progression;

    rootEl().insertAdjacentHTML('beforeend', `
      <section id="section-progression-workouts">
        <h2>Workout pace progression</h2>
        <p class="desc">Each dot is one synced workout's work-lap pace · shaded band is its frozen target range · dashed line is monthly 5K-pace fitness context</p>
        <div class="chart-wrap"><div id="chart-workouts" style="width:100%;height:100%"></div></div>
        <div class="chart-legend">
          <span class="legend-swatch"><span class="legend-box" style="background:${withAlpha(cssVar('--muted'), 0.35)}"></span>Target band</span>
          <span class="legend-swatch"><span class="legend-box" style="background:${cssVar('--series-8')}"></span>Actual pace</span>
          <span class="legend-swatch"><span class="legend-line"></span>5K fitness (monthly)</span>
        </div>
        ${captions && captions.workouts ? `<p class="chart-caption">${esc(captions.workouts)}</p>` : ''}
      </section>`);

    const theme = chartTheme();
    const withBand = workouts.filter(w => w.pace_lo != null && w.pace_hi != null);
    const bandBase = withBand.map(w => [w.date, w.pace_lo]);
    const bandRange = withBand.map(w => [w.date, w.pace_hi - w.pace_lo]);
    const dotData = workouts
      .filter(w => w.pace_min_per_mile != null)
      .map(w => ({
        value: [w.date, w.pace_min_per_mile],
        meta: w,
        itemStyle: { color: theme.series[7] },
      }));
    const checkpointData = (checkpoints ?? [])
      .filter(c => c.pace_5k != null)
      .map(c => [`${c.month}-01`, c.pace_5k]);

    const rangeStart = weeks[0];
    const rangeEnd = addDays(weeks[weeks.length - 1], 6);

    // The invisible band-base bar anchors the value axis at 0, which squashes
    // 6–7 min/mi paces into a sliver — pin the axis to the data extent
    // (half-minute snapped) instead.
    const paceVals = [
      ...withBand.flatMap(w => [w.pace_lo, w.pace_hi]),
      ...dotData.map(d => d.value[1]),
      ...checkpointData.map(c => c[1]),
    ];
    const paceExtent = paceVals.length
      ? { min: Math.floor((Math.min(...paceVals) - 0.25) * 2) / 2, max: Math.ceil((Math.max(...paceVals) + 0.25) * 2) / 2 }
      : {};

    const chart = echarts.init(document.getElementById('chart-workouts'));
    OVERALL_CHARTS.push(chart);
    chart.setOption({
      animation: false,
      grid: { top: 24, right: 24, bottom: 32, left: 48 },
      tooltip: {
        trigger: 'item',
        backgroundColor: theme.surface,
        borderColor: theme.gridline,
        textStyle: { fontSize: 12, color: theme.text },
        formatter(params) {
          if (params.seriesName === '5K fitness') {
            return `<div style="font-weight:600;color:${theme.text}">${params.value[0].slice(0, 7)}</div>5K pace: ${fmt.pace(params.value[1])}/mi`;
          }
          const w = params.data && params.data.meta;
          if (!w) return '';
          const band = w.pace_lo != null && w.pace_hi != null ? `${fmt.pace(w.pace_lo)}–${fmt.pace(w.pace_hi)}/mi` : 'no target band';
          return `<div style="font-weight:600;margin-bottom:2px;color:${theme.text}">${shortDate(w.date)}${w.title ? ' · ' + esc(w.title) : ''}</div>
            Actual: ${fmt.pace(w.pace_min_per_mile)}/mi<br>
            Target: ${band}`;
        },
      },
      xAxis: {
        type: 'time',
        min: rangeStart,
        max: rangeEnd,
        axisLine: { lineStyle: { color: theme.gridline } },
        axisTick: { show: false },
        axisLabel: { fontSize: 11, color: theme.muted },
      },
      yAxis: {
        type: 'value',
        inverse: true,
        name: 'min/mi',
        nameLocation: 'middle',
        nameGap: 40,
        nameTextStyle: { fontSize: 11, color: theme.muted },
        axisLine: { show: false },
        axisTick: { show: false },
        splitLine: { lineStyle: { color: theme.gridline } },
        axisLabel: { fontSize: 11, color: theme.muted, formatter: fmt.pace },
        ...paceExtent,
      },
      series: [
        {
          name: 'band-base',
          type: 'bar',
          stack: 'band',
          data: bandBase,
          barWidth: 14,
          itemStyle: { color: 'transparent' },
          silent: true,
          tooltip: { show: false },
          z: 1,
        },
        {
          name: 'Target band',
          type: 'bar',
          stack: 'band',
          data: bandRange,
          barWidth: 14,
          itemStyle: { color: withAlpha(theme.muted, 0.35) },
          silent: true,
          tooltip: { show: false },
          z: 1,
        },
        {
          name: '5K fitness',
          type: 'line',
          data: checkpointData,
          showSymbol: true,
          symbolSize: 4,
          lineStyle: { color: theme.muted, width: 1.5, type: 'dashed', opacity: 0.6 },
          itemStyle: { color: theme.muted, opacity: 0.6 },
          z: 2,
        },
        {
          name: 'Actual pace',
          type: 'scatter',
          data: dotData,
          symbolSize: 9,
          z: 3,
        },
      ],
    });
    window.addEventListener('resize', () => chart.resize());
  }

  // -----------------------------------------------------------------------
  // Version history
  // -----------------------------------------------------------------------

  const diffCache = new Map(); // "a:b" -> VersionDiff

  const DIFF_FIELD_LABEL = {
    target_miles: 'target miles', target_workouts: 'workouts', target_long_run_miles: 'long run',
    phase: 'phase', note: 'note', slot: 'slot', title: 'title', target_json: 'workout target',
  };
  function diffFieldLabel(f) { return DIFF_FIELD_LABEL[f] ?? f; }

  function diffWeekRow(w) {
    return `<div class="diff-week">
      <div class="diff-week-start">${shortDate(w.week_start)}</div>
      <div class="diff-tag ${w.change}">${w.change}</div>
      <div class="diff-fields">${w.changed_fields.length ? w.changed_fields.map(diffFieldLabel).join(', ') : ''}</div>
    </div>`;
  }

  async function loadDiff(a, b) {
    const key = `${a}:${b}`;
    if (diffCache.has(key)) return diffCache.get(key);
    const res = await fetch(`/api/plan-diff?a=${a}&b=${b}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const diff = await res.json();
    diffCache.set(key, diff);
    return diff;
  }

  async function toggleDiff(panel, prevId, curId) {
    const isOpen = panel.classList.contains('open');
    if (isOpen) {
      panel.classList.remove('open');
      return;
    }
    panel.classList.add('open');
    if (panel.dataset.loaded) return;
    panel.innerHTML = `<p class="diff-empty">Loading…</p>`;
    try {
      const diff = await loadDiff(prevId, curId);
      panel.dataset.loaded = '1';
      panel.innerHTML = diff.changed_weeks.length
        ? diff.changed_weeks.map(diffWeekRow).join('')
        : `<p class="diff-empty">No week-level changes between these versions.</p>`;
    } catch (err) {
      panel.innerHTML = `<p class="diff-empty">Error loading diff: ${esc(err.message)}</p>`;
    }
  }

  function versionItem(v, prev) {
    const dateStr = v.created_at.slice(0, 10);
    const toggle = prev ? `<span class="version-toggle">vs v${prev.version_n} ▾</span>` : '';
    return `
      <div class="version-item">
        <div class="version-head" data-version-id="${v.version_id}" data-prev-id="${prev ? prev.version_id : ''}">
          <span class="version-tag">v${v.version_n}</span>
          <span class="version-date">${shortDate(dateStr)}</span>
          <span class="version-author">${esc(v.author)}</span>
          <span class="version-note">${esc(v.note ?? '')}</span>
          ${toggle}
        </div>
        <div class="version-diff" id="diff-${v.version_id}"></div>
      </div>`;
  }

  function renderVersions(versions) {
    if (!versions.length) return;
    // Newest first for display; each item (but the first/original) can expand
    // a diff against the version immediately before it.
    const ordered = [...versions].reverse();
    rootEl().insertAdjacentHTML('beforeend', `
      <section id="section-versions">
        <h2>Version history</h2>
        <p class="desc">Every revision is a full snapshot · click a version with a note to see which weeks changed</p>
        <div class="version-list">
          ${ordered.map((v, i) => versionItem(v, ordered[i + 1])).join('')}
        </div>
      </section>`);

    document.querySelectorAll('.version-head').forEach(head => {
      head.addEventListener('click', () => {
        const prevId = head.dataset.prevId;
        if (!prevId) return;
        const panel = document.getElementById(`diff-${head.dataset.versionId}`);
        toggleDiff(panel, Number(prevId), Number(head.dataset.versionId));
      });
    });
  }

  // -----------------------------------------------------------------------
  // Today view — one kicker line, then the two-card at-a-glance grid (see
  // plan_api.py's _today_blocks for how week_so_far/vs_last_week are
  // computed: both pro-rate/cut off by planned days and the sync cutoff
  // server-side, so this rendering layer only formats what's already there).
  // -----------------------------------------------------------------------

  function todayKickerHTML(data) {
    const { plan, today } = data;
    const days = Math.round((new Date(plan.race_date + 'T00:00:00') - new Date(today.date + 'T00:00:00')) / 86400000);
    const synced = data.synced_through ? ` <span class="kicker-sub">· synced through ${shortDate(data.synced_through)}</span>` : '';
    if (days <= 0) return `<div class="race-countdown">${esc(plan.title)} · ${shortDate(plan.race_date)}${synced}</div>`;
    return `<div class="race-countdown"><span class="race-countdown-num">${days}</span> day${days === 1 ? '' : 's'} to ${esc(plan.title)} <span class="kicker-sub">${shortDate(plan.race_date)}</span>${synced}</div>`;
  }

  function todaySessionHTML(data) {
    const { today, plan } = data;
    if (!today || !today.week_start) {
      return `<div class="today-card"><p class="desc" style="margin:0">Outside the plan window.</p></div>`;
    }
    const day = today.day;
    const dateLine = `<div class="panel-label">Today · ${new Date(today.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</div>`;
    const parts = [dateLine];
    if (today.is_race_day) {
      parts.push(`<div class="today-race">Race day — ${esc(plan.title)}.</div>`);
      if (day && day.note) parts.push(`<p class="today-note">${esc(day.note)}</p>`);
    } else {
      if (today.is_race_week) parts.push(`<div class="today-raceweek">Race week — ${esc(plan.title)} is ${shortDate(plan.race_date)}.</div>`);
      if (!day || day.slot === 'rest') {
        parts.push(`<div class="today-rest">Rest day.</div>`);
        if (day && day.note) parts.push(`<p class="today-note">${esc(day.note)}</p>`);
      } else {
        const glyph = day.terrain === 'trail' ? TRAIL_GLYPH : '';
        const label = day.title ? esc(day.title) : (SLOT_LABEL[day.slot] ?? day.slot);
        parts.push(`<div class="today-slot" style="color:${SLOT_COLOR[day.slot] ?? 'var(--text)'}">${esc(SLOT_LABEL[day.slot] ?? day.slot)}</div>`);
        parts.push(`<div class="today-title">${label}${glyph}</div>`);
        const lines = describeDayTarget(day);
        if (lines.length) {
          // First line is the session itself ("6.0 mi", "8–10 × 3:00 @ …") —
          // it gets display size; the rest stay secondary.
          parts.push(`<div class="today-targets">${lines.map((l, i) => `<div${i === 0 ? ' class="target-lead"' : ''}>${esc(l)}</div>`).join('')}</div>`);
        }
        if (day.note) parts.push(`<p class="today-note">${esc(day.note)}</p>`);
      }
    }
    parts.push(todaySyncedHTML(today.date));
    parts.push(upNextHTML(today.date));
    return `<div class="today-card" data-plan-date="${today.date}">${parts.join('')}</div>`;
  }

  // Today's synced run(s) right under the prescription — actual miles and
  // pace beside the target answers "did I hit it" without opening anything.
  function todaySyncedHTML(todayStr) {
    const runs = PLAN_DATA.actualByDate.get(todayStr) ?? [];
    if (!runs.length) return '';
    const lines = runs.map(r => {
      const bits = [`${r.distance_mi.toFixed(1)} mi`];
      if (r.pace_min_per_mile != null) bits.push(`${fmt.pace(r.pace_min_per_mile)}/mi`);
      return `<div class="today-next-line" title="${esc(r.name ?? '')}">
        <span class="cal-dot" style="background:${TYPE_COLOR[r.run_type] ?? 'var(--muted)'}"></span>
        <span>${bits.join(' · ')}</span>
      </div>`;
    }).join('');
    return `<div class="today-done"><div class="panel-label">Synced today</div>${lines}</div>`;
  }

  // Tomorrow's slot as the card's footer — clicking it opens tomorrow's
  // popover (the inner data-plan-date wins via closest()).
  function upNextHTML(todayStr) {
    const tomorrow = addDays(todayStr, 1);
    const day = PLAN_DATA.dayByDate.get(tomorrow);
    if (!day) return '';
    const wd = new Date(tomorrow + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' });
    const glyph = day.terrain === 'trail' ? TRAIL_GLYPH : '';
    const label = day.title ? esc(day.title) : (SLOT_LABEL[day.slot] ?? day.slot);
    const extras = [];
    if (day.target_miles != null) extras.push(`${day.target_miles.toFixed(1)} mi`);
    if (day.target_minutes != null) extras.push(fmtDuration(day.target_minutes));
    return `
      <div class="today-next" data-plan-date="${tomorrow}">
        <div class="panel-label">Up next · ${wd}</div>
        <div class="today-next-line">
          <span class="cal-dot" style="background:${SLOT_COLOR[day.slot] ?? 'var(--muted)'}"></span>
          <span>${label}${glyph}${extras.length ? ` · ${extras.join(' · ')}` : ''}</span>
        </div>
      </div>`;
  }

  // The chip's big number is always miles (the runner's unit): actual run
  // miles once the day has data, planned miles (or duration) ahead of it,
  // "0" for an elapsed planned day with nothing synced — hit/missed reads
  // straight off the row. The done-fill means "a run synced", never just
  // "the date passed".
  function dayChip(dateStr, todayStr) {
    const day = PLAN_DATA.dayByDate.get(dateStr) ?? null;
    const runs = PLAN_DATA.actualByDate.get(dateStr) ?? [];
    const slot = day ? day.slot : 'rest';
    const color = SLOT_COLOR[slot] ?? 'var(--muted)';
    const stateClass = [
      runs.length ? 'done' : '',
      dateStr === todayStr ? 'today' : dateStr > todayStr ? 'upcoming' : '',
    ].filter(Boolean).join(' ');
    const glyph = day && day.terrain === 'trail' ? TRAIL_GLYPH : '';
    const label = day ? (SLOT_LABEL[day.slot] ?? day.slot) : 'Rest';
    const wd = new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' });

    const plannedNum = day && day.target_miles != null ? trimMiles(day.target_miles)
      : day && day.target_minutes != null ? fmtDuration(day.target_minutes)
      : null;
    const ranMi = runs.reduce((s, r) => s + r.distance_mi, 0);
    const num = runs.length ? trimMiles(ranMi)
      : dateStr < todayStr ? (slot === 'rest' ? '—' : '0')
      : plannedNum ?? (slot === 'rest' ? '—' : '·');

    const titleParts = [`${label}${glyph}`];
    if (plannedNum != null) titleParts.push(`plan ${plannedNum}${day.target_miles != null ? ' mi' : ''}`);
    if (runs.length) titleParts.push(`ran ${trimMiles(ranMi)} mi`);
    return `<div class="day-chip ${stateClass}" style="--chip-color:${color}" data-plan-date="${dateStr}" title="${esc(titleParts.join(' · '))}">
      <div class="day-chip-wd">${wd}</div>
      <div class="day-chip-num">${num}</div>
      <div class="day-chip-slot">${esc(label)}${glyph}</div>
    </div>`;
  }

  function weekCardHTML(data) {
    const { today, week_so_far } = data;
    if (!today || !today.week_start) {
      return `<div class="week-card"><p class="desc" style="margin:0">Outside the plan window.</p></div>`;
    }
    const days = Array.from({ length: 7 }, (_, i) => addDays(today.week_start, i));
    const chips = days.map(d => dayChip(d, today.date)).join('');
    const ws = week_so_far;
    const started = ws && ws.week_started;
    const headline = !started ? '' : ws.target_miles == null
      ? `${ws.actual_workouts_so_far} of ${ws.target_workouts} workouts so far`
      : `${ws.actual_miles_so_far.toFixed(1)} of ${targetMilesLabel(ws)} mi so far`;
    const progress = !ws ? ''
      : !started ? `<p class="week-shape">Sync hasn't reached this week yet.</p>`
      : `${meterHTML(ws)}<p class="week-shape">${esc(remainingShape(ws.remaining_days))}</p>`;
    return `
      <div class="week-card">
        <div class="week-card-head">
          <span class="panel-label">This week${ws ? ` · ${esc(ws.phase)} phase` : ''}</span>
          ${headline ? `<span class="week-headline">${esc(headline)}</span>` : ''}
        </div>
        <div class="day-chip-row">${chips}</div>
        ${ws && ws.note ? `<p class="week-note-line" title="${esc(ws.note)}">${esc(ws.note)}</p>` : ''}
        ${progress}
        ${rampLine(data)}
        <div class="week-divider"></div>
        ${vsLastWeekHTML(data)}
      </div>`;
  }

  // "22 of 30 → 42 → 48 mi/wk" — last completed week's actual against its
  // target, then this week's and next week's targets: the ramp, in one line.
  function rampLine(data) {
    const weeks = data.weeks ?? [];
    const i = weeks.findIndex(w => w.is_current);
    if (i < 0) return '';
    const steps = [];
    const prev = weeks[i - 1];
    if (prev) steps.push(`${trimMiles(prev.actual_miles)} of ${targetMilesLabel(prev)}`);
    steps.push(targetMilesLabel(weeks[i]));
    if (weeks[i + 1]) steps.push(targetMilesLabel(weeks[i + 1]));
    if (steps.length < 2) return '';
    return `<p class="week-shape"><span class="panel-label">Ramp</span> ${esc(steps.join(' → '))} mi/wk</p>`;
  }

  // Expected-by-now marker — a single ratio against a limit (a meter, not a
  // bar chart): one accent fill, a lighter band for a range week's [lo, hi],
  // and a plain neutral tick for the pro-rated expectation. No color codes
  // ahead/behind — the numbers next to it carry that, not the marker.
  function meterHTML(ws) {
    if (!ws || ws.target_miles == null) return '';
    const hi = ws.target_miles_hi ?? ws.target_miles;
    const scaleMax = Math.max(hi, ws.actual_miles_so_far, ws.expected_miles_by_now ?? 0, 1) * 1.05;
    const pct = v => Math.max(0, Math.min(100, (v / scaleMax) * 100));
    const rangeBand = ws.target_miles_hi != null
      ? `<div class="meter-range" style="left:${pct(ws.target_miles)}%;width:${(pct(ws.target_miles_hi) - pct(ws.target_miles)).toFixed(2)}%"></div>` : '';
    const mark = ws.expected_miles_by_now != null
      ? `<div class="meter-mark" style="left:${pct(ws.expected_miles_by_now)}%" title="usually ~${ws.expected_miles_by_now.toFixed(1)} mi by now"></div>` : '';
    return `<div class="meter">${rangeBand}<div class="meter-fill" style="width:${pct(ws.actual_miles_so_far)}%"></div>${mark}</div>`;
  }

  // A tiny paired-bar SVG, day by day — lighter than an ECharts instance for
  // ≤7 data points. Two bars per elapsed day (last week muted, this week
  // accent), a plain 2-series comparison, not a judgment encoding.
  function pairedBarSVG(days) {
    if (!days.length) return '';
    const barW = 8, gap = 3, groupGap = 7, H = 28;
    const maxVal = Math.max(0.1, ...days.flatMap(d => [d.miles, d.last_week_miles]));
    const groupW = barW * 2 + gap;
    const width = days.length * groupW + (days.length - 1) * groupGap;
    let x = 0;
    const bars = days.map(d => {
      const hThis = (d.miles / maxVal) * H;
      const hLast = (d.last_week_miles / maxVal) * H;
      const svg = `
        <rect x="${x}" y="${(H - hLast).toFixed(1)}" width="${barW}" height="${Math.max(0, hLast).toFixed(1)}" rx="1" fill="var(--muted)" fill-opacity="0.55"><title>${shortDate(d.last_week_date)}: ${d.last_week_miles.toFixed(1)} mi</title></rect>
        <rect x="${x + barW + gap}" y="${(H - hThis).toFixed(1)}" width="${barW}" height="${Math.max(0, hThis).toFixed(1)}" rx="1" fill="var(--accent)"><title>${shortDate(d.date)}: ${d.miles.toFixed(1)} mi</title></rect>`;
      x += groupW + groupGap;
      return svg;
    }).join('');
    return `<svg width="${width}" height="${H}" viewBox="0 0 ${width} ${H}">${bars}</svg>`;
  }

  function vsLastWeekHTML(data) {
    const vw = data.vs_last_week;
    const head = `<span class="panel-label">vs last week at this point</span>`;
    if (!vw) {
      return `
        <div class="week-card-head">${head}</div>
        <p class="week-shape">Not enough synced data this week yet to compare.</p>`;
    }
    const sign = vw.delta_miles >= 0 ? '+' : '';
    return `
      <div class="week-card-head">
        ${head}
        <span class="week-headline">${sign}${vw.delta_miles.toFixed(1)} mi</span>
      </div>
      <div class="vs-row">
        <div class="paired-bar-wrap">${pairedBarSVG(vw.days)}</div>
        <div class="chart-legend">
          <span class="legend-swatch"><span class="legend-box" style="background:var(--accent)"></span>This week</span>
          <span class="legend-swatch"><span class="legend-box" style="background:var(--muted);opacity:0.55"></span>Last week</span>
        </div>
      </div>`;
  }

  function renderToday(data) {
    const target = document.getElementById('tab-today');
    if (!target) return;
    target.innerHTML = `
      ${todayKickerHTML(data)}
      <div class="today-grid">
        ${todaySessionHTML(data)}
        ${weekCardHTML(data)}
      </div>`;
  }

  // -----------------------------------------------------------------------
  // Load + orchestrate
  // -----------------------------------------------------------------------

  async function loadPlan() {
    const res = await fetch('/api/plan');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function loadVersions() {
    const res = await fetch('/api/plan-versions');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function loadAdherence() {
    const res = await fetch('/api/plan-adherence');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function loadProgression() {
    const res = await fetch('/api/plan-progression');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function loadRetrospective() {
    const res = await fetch('/api/plan-retrospective');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  function renderHeader(data) {
    const { plan } = data;
    document.title = `Miles · ${plan.title}`;
    const parts = [distLabel(plan.distance_bucket), longDate(plan.race_date), plan.status];
    document.getElementById('subtitle').textContent = `${plan.title} · ${parts.join(' · ')}`;
  }

  Promise.all([
    loadPlan(),
    loadVersions().catch(() => []),
    loadAdherence().catch(() => null),
    loadProgression().catch(() => null),
    loadRetrospective().catch(() => null),
  ]).then(([data, versions, adherence, progression, retrospective]) => {
    if (data === null) {
      renderEmpty();
      return;
    }
    PLAN_DATA = {
      dayByDate: new Map(data.days.map(d => [d.date, d])),
      actualByDate: new Map(Object.entries(data.actual ?? {})),
      logByDate: new Map(Object.entries(data.log ?? {})),
    };
    const bandByWeek = new Map((adherence?.weeks ?? []).map(w => [w.week_start, w.band]));
    renderHeader(data);

    // Today is default-visible for an active plan whose window covers today;
    // a completed plan skips it entirely and renders the retrospective the
    // way v1 always did, straight into #root, no tabs.
    const showTabs = data.plan.status === 'active' && data.today != null;
    if (showTabs) {
      renderTabs();
      renderToday(data);
    }
    if (data.plan.status === 'completed') {
      renderRetrospective(data, retrospective);
    } else {
      renderStatStrip(data, adherence);
    }
    renderChart(data, bandByWeek, adherence?.flags ?? []);
    renderCalendar(data, bandByWeek);
    renderFlags(adherence);
    renderProgressionEasy(progression);
    renderProgressionWorkouts(progression);
    renderVersions(versions);

    if (showTabs) activatePlanTab((location.hash || '#today').replace('#', ''));

    document.getElementById('root').addEventListener('click', e => {
      const el = e.target.closest('[data-plan-date]');
      if (el) openDayPopover(el.dataset.planDate);
    });
  }).catch(err => {
    document.getElementById('subtitle').textContent = `Error: ${err.message}`;
  });
</script>
</body>
</html>
