<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miles · Activities</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
  <link rel="stylesheet" href="/theme.css">
  <style>
    .activities-view h1 {
      font-size: 1.25rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .activities-view .subtitle { font-size: 0.8125rem; color: var(--muted); margin-bottom: 1.25rem; }
    .activities-view .activities-empty { font-size: 0.8125rem; color: var(--muted); padding: 1rem 0; }
    .activities-view .dense tbody td { padding: 0.25rem 0.75rem; font-size: 0.75rem; }
    .activities-view .dense thead th { padding: 0.375rem 0.75rem; font-size: 0.625rem; }
    .activities-view .entity-link { color: inherit; text-decoration: none; }
    .activities-view .entity-link:hover { text-decoration: underline; }
    .activities-view .run-type { font-size: 0.6875rem; color: var(--muted); text-transform: capitalize; }
    .activities-view .load-more-row { text-align: center; padding: 1rem 0; }
    .activities-view .load-more-btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }
    .activities-view .load-more-btn:hover { background: var(--pr-bg-hover); }
    .activities-view .load-more-btn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
<script src="/nav.js"></script>
<script src="/charts.js"></script>

<main class="activities-view">
  <h1>Activities</h1>
  <p class="subtitle" id="subtitle">Loading…</p>

  <div id="section-activities" style="display:none">
    <div class="scroll dense">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Type</th>
            <th class="r">Distance</th>
            <th class="r">Time</th>
            <th class="r">Pace</th>
            <th class="r">Avg HR</th>
          </tr>
        </thead>
        <tbody id="body-activities"></tbody>
      </table>
    </div>
    <div class="load-more-row">
      <button class="load-more-btn" id="load-more">Load more</button>
    </div>
  </div>

  <p class="activities-empty" id="empty" style="display:none">No activities synced yet.</p>
</main>

<script>
  const PAGE_SIZE = 50;
  let offset = 0;
  let loading = false;

  function td(val, cls = 'r') {
    if (val == null) return `<td class="dash">—</td>`;
    return `<td class="${cls}">${val}</td>`;
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g,
      ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  function renderRows(rows) {
    const body = document.getElementById('body-activities');
    body.insertAdjacentHTML('beforeend', rows.map(r => `
      <tr>
        <td>${esc(r.start_date ? r.start_date.slice(0, 10) : '—')}</td>
        <td><a class="entity-link" href="/activity.html?id=${r.id}">${esc(r.name ?? 'Untitled')}</a></td>
        <td><span class="run-type">${esc(r.run_type)}</span></td>
        ${td(r.distance_mi != null ? `${r.distance_mi.toFixed(2)} mi` : null)}
        ${td(fmt.time(r.moving_time_s))}
        ${td(r.pace_min_per_mile != null ? `${fmt.pace(r.pace_min_per_mile)}/mi` : null)}
        ${td(r.avg_hr)}
      </tr>
    `).join(''));
  }

  async function loadPage() {
    if (loading) return;
    loading = true;
    const btn = document.getElementById('load-more');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    const res = await fetch(`/api/activities-list?offset=${offset}&limit=${PAGE_SIZE}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const page = await res.json();

    renderRows(page.rows);
    offset += page.rows.length;

    btn.disabled = false;
    btn.textContent = 'Load more';
    btn.style.display = page.has_more ? '' : 'none';
    loading = false;
    return page;
  }

  loadPage().then(page => {
    if (!page.rows.length) {
      document.getElementById('subtitle').textContent = 'No activities synced yet.';
      document.getElementById('empty').style.display = '';
      return;
    }
    document.getElementById('subtitle').textContent = 'All synced runs, newest first.';
    document.getElementById('section-activities').style.display = '';
    document.getElementById('load-more').addEventListener('click', loadPage);
  }).catch(err => {
    document.getElementById('subtitle').textContent = `Error: ${err.message}`;
  });
</script>
</body>
</html>
